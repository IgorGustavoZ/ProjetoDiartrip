<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diartrip</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="static/style.css">
<link rel="shortcut icon" href="imagens/favicon-diartrip.png" type="image/x-icon">
</head>
<body>
    <div class="app">

    <div class="sidebar">

    <a href="#">
        <a href="index.html"><div class="logo"><img src="imagens/logo-diartrip.png" alt=""></div></a>
    </a>

    <div class="menu-item">✈ Minhas viagens</div>
    <div class="menu-item">💬 Chat IA</div>
    <a href="lobby-pags/config.html">
        <div class="menu-item">⚙ Configurações</div>
    </a>

    <a href="lobby-pags/form-viagem.html">
        <button class="new-trip">+ Nova viagem</button>
    </a>

    </div>

    <div class="main">

    <div class="header">
    <h2>Minhas viagens</h2>
    <div class="user"></div>
    </div>

    <div class="content">

    <div class="trips">
    <h3>Suas viagens</h3>

    <div class="trip-grid">

    <!-- <div class="trip-card">
    <strong>Roma</strong>
    <div class="trip-date">12 Jul - 18 Jul</div>
    </div>

    <div class="trip-card">
    <strong>Paris</strong>
    <div class="trip-date">02 Ago - 10 Ago</div>
    </div>

    <div class="trip-card">
    <strong>Santiago</strong>
    <div class="trip-date">05 Set - 12 Set</div>
    </div> -->

    </div>

    </div>

    <div class="chat">

    <div class="chat-header">Assistente de Viagem IA</div>

    <div id="chatMessages" class="chat-messages">
    <div class="message"><strong>IA:</strong> Olá! Posso ajudar a planejar sua viagem.</div>
    </div>

    <div class="chat-input">
    <input id="chatInput" placeholder="Pergunte algo sobre sua viagem...">
    <button onclick="sendMessage()">Enviar</button>
    </div>

    </div>

    </div>

    </div>

    </div>

<script>
    const txtBv = async ()=>{
        const respGetUsuario = await fetch(`http://127.0.0.1:8000/usuarios/${sessionStorage.getItem("id")}`, {
            method: 'GET', 
            headers: {
                'Authorization': `Bearer ${sessionStorage.getItem("token")}`,
                'Content-Type': 'application/json'
            }
        })

        if(respGetUsuario.ok){
            const dados = await respGetUsuario.text()
           
            const respJson = JSON.parse(dados)

            document.querySelector(".user").innerHTML = `Olá, ${respJson.nome}!`

        } 
    }

    txtBv()


    function sendMessage(){

    const input = document.getElementById('chatInput')
    const messages = document.getElementById('chatMessages')

    const text = input.value.trim()
    if(!text) return

    const userMsg = document.createElement('div')
    userMsg.className = 'message'
    userMsg.innerHTML = '<strong>Você:</strong> ' + text
    messages.appendChild(userMsg)

    input.value = ''

    setTimeout(()=>{

    const aiMsg = document.createElement('div')
    aiMsg.className = 'message'
    aiMsg.innerHTML = '<strong>IA:</strong> Posso sugerir restaurantes, eventos ou clima da viagem.'

    messages.appendChild(aiMsg)
    messages.scrollTop = messages.scrollHeight

    },800)

    messages.scrollTop = messages.scrollHeight

    }
</script>

</body>
</html>
