<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <title>Document</title>
</head>
<body style="overflow: hidden;">
    <section style="padding:100px 20px; max-width:600px; margin:auto; position: relative; bottom: 100px;">
        <h2 class="section-title">Criar conta</h2>
        <form id="signupForm" style="display:flex; flex-direction:column; gap:22px; background:rgba(255,255,255,0.05); padding:40px; border-radius:16px; border:1px solid rgba(255,255,255,0.08); backdrop-filter:blur(6px); position:relative;">

        <div class="field">
        <label>Nome</label>
        <input id="name" type="text" placeholder="Digite seu nome" required>
        <span class="error" id="nameError"></span>
        </div>

        <div class="field">
        <label>Email</label>
        <input id="email" type="email" placeholder="Digite seu email" required>
        <span class="error" id="emailError"></span>
        </div>

        <div class="field" style="position:relative">
        <label>Senha</label>
        <input id="password" type="password" placeholder="Crie uma senha" required>
        <span id="togglePassword" style="position:absolute; right:12px; top:38px; cursor:pointer; font-size:14px; color:#94a3b8;">mostrar</span>
        <span class="error" id="passwordError"></span>
        </div>

        <button class="cta" type="submit">Criar conta</button>

        <div id="success" style="display:none; text-align:center; color:#22c55e; font-weight:600;">
        Conta criada com sucesso!
    </div>
    </form>
    <footer>
    © 2026 Diartrip — Planejamento Inteligente de Viagens
    </footer>
<script>
    const form = document.getElementById("signupForm")
    const nameInput = document.getElementById("name")
    const emailInput = document.getElementById("email")
    const passwordInput = document.getElementById("password")
    const togglePassword = document.getElementById("togglePassword")

    const nameError = document.getElementById("nameError")
    const emailError = document.getElementById("emailError")
    const passwordError = document.getElementById("passwordError")

    const success = document.getElementById("success")

    form.addEventListener("submit", function(e){
    e.preventDefault()

    let valid = true

    nameError.textContent = ""
    emailError.textContent = ""
    passwordError.textContent = ""

    if(nameInput.value.length < 3){
    nameError.textContent = "Nome deve ter pelo menos 3 caracteres"
    valid = false
    }

    if(!emailInput.value.includes("@")){
    emailError.textContent = "Email inválido"
    valid = false
    }

    if(passwordInput.value.length < 6){
    passwordError.textContent = "Senha deve ter no mínimo 6 caracteres"
    valid = false
    }

    if(valid){
    success.style.display = "block"
    form.reset()
    }
    })

    // mostrar ou esconder senha

    togglePassword.addEventListener("click", () => {
    if(passwordInput.type === "password"){
    passwordInput.type = "text"
    togglePassword.textContent = "ocultar"
    }else{
    passwordInput.type = "password"
    togglePassword.textContent = "mostrar"
    }
    })
</script>
</body>
</html>
