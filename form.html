<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <title>Diartrip - Cadastro</title>
</head>
<body style="overflow: hidden;">
    <header>
        <a href="index.html"><div class="logo">Diartrip</div></a>
    </header>
    <section style="padding:100px 20px; max-width:600px; margin:auto; position: relative; bottom: 100px;">
        <h2 class="section-title titulo" style="margin-bottom:20px;">Cadastro</h2>
        <form id="signupForm" style="display:flex; flex-direction:column; gap:22px; background:rgba(255,255,255,0.05); padding:40px; border-radius:16px; border:1px solid rgba(255,255,255,0.08); backdrop-filter:blur(6px); position:relative;">

        <div class="field">
        <label>Nome</label>
        <input id="name" type="text" placeholder="Digite seu nome" required>
        <span class="error" id="nameError"></span>
        </div>

        <div class="field">
        <label>Email</label>
        <input id="email" type="email" placeholder="Digite seu email" required>
        <span class="error" id="emailError"></span>
        </div>

        <div class="field" style="position:relative">
        <label>Senha</label>
        <input id="password" type="password" placeholder="Crie uma senha" required>
        <span id="togglePassword" style="position:absolute; right:12px; top:38px; cursor:pointer; font-size:14px; color:#94a3b8;">mostrar</span>
        <span class="error" id="passwordError"></span>
        </div>
        <input class="cta" id="submit" type="submit" value="Criar conta">
        <div class="login"><a href="login.html">Já tem uma conta? Clique aqui.</a></div>
        
    </form>
    
    <footer>
    © 2026 Diartrip — Planejamento Inteligente de Viagens
    </footer>
<script>
    const form = document.getElementById("signupForm")
    const nameInput = document.getElementById("name")
    const emailInput = document.getElementById("email")
    const passwordInput = document.getElementById("password")
    const togglePassword = document.getElementById("togglePassword")

    const nameError = document.getElementById("nameError")
    const emailError = document.getElementById("emailError")
    const passwordError = document.getElementById("passwordError")

    // const success = document.getElementById("success")

    const submit = document.querySelector("#submit")

    form.addEventListener("submit", function(e){
        e.preventDefault()

        let valid = true

        nameError.textContent = ""
        emailError.textContent = ""
        passwordError.textContent = ""

        if(nameInput.value.length < 3){
            nameError.textContent = "Nome deve ter pelo menos 3 caracteres"
            valid = false
        }

        if(!emailInput.value.includes("@")){
            emailError.textContent = "Email inválido"
            valid = false
        }

        if(passwordInput.value.length < 6){
            passwordError.textContent = "Senha deve ter no mínimo 6 caracteres"
            valid = false
        }

        if(valid){
            // success.style.display = "block"
            form.reset()
        }
    })

    // mostrar ou esconder senha

    togglePassword.addEventListener("click", () => {
        if(passwordInput.type === "password"){
            passwordInput.type = "text"
            togglePassword.textContent = "ocultar"
        }else{
            passwordInput.type = "password"
            togglePassword.textContent = "mostrar"
    }
    })

    // quando for clicado em enviar
    submit.addEventListener("click", async ()=>{
        console.log(
            `
            "nome": ${nameInput.value},
            "email": ${emailInput.value},
            "senha": ${passwordInput.value}
            `
        )

        const nome = nameInput.value
        const email = emailInput.value
        const senha = passwordInput.value

        if(nameInput.value != "" && emailInput.value != "" && passwordInput.value != ""){
            const resp = await fetch(`http://127.0.0.1:8000/usuarios?nome=${nome}&email=${email}&senha=${senha}`, {
            method: "POST",
            headers:{
                "Content-type": "application/json"
            }
            // body: JSON.stringify({
            //     "nome": nome,
            //     "email": email,
            //     "senha": password
            // }),
            })
            if(resp.ok){
                const respLogin = await fetch(`http://127.0.0.1:8000/login?email=${email}&senha=${senha}`, {
                    method: "POST",
                    headers:{
                        "Content-type": "application/json"
                    }
                })

                if(!respLogin.ok){
                    console.log("Erro no login do usuário!")
                    return
                } 

                const dados = await respLogin.text()

                console.log("Dados do login: "+dados)

                const respJson = JSON.parse(dados)

                sessionStorage.setItem("token", respJson.token)
                sessionStorage.setItem("id", respJson.usuario_id)

                window.location.href = "lobby.html" 
            }else{
                const dados = await resp.json()
                console.log("Erro no envio dos dados: "+dados)
                return
            }
        }     
    })
</script>
</body>
</html>
