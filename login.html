<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <title>Document</title>
</head>
<body style="overflow: hidden;">
    <header>
        <a href="index.html"><div class="logo">Diartrip</div></a>
    </header>
    <section style="padding:100px 20px; max-width:600px; margin:auto; position: relative; bottom: 70px;">
        <h2 class="section-title titulo" style="margin-bottom:20px;">Login</h2>
        <form id="signupForm" style="display:flex; flex-direction:column; gap:22px; background:rgba(255,255,255,0.05); padding:40px; border-radius:16px; border:1px solid rgba(255,255,255,0.08); backdrop-filter:blur(6px); position:relative;">

        <div class="field">
        <label>Email</label>
        <input id="email" type="email" placeholder="Digite seu email" required>
        
        </div>

        <div class="field" style="position:relative">
        <label>Senha</label>
        <input id="password" type="password" placeholder="Crie uma senha" required>
        <span id="togglePassword" style="position:absolute; right:12px; top:38px; cursor:pointer; font-size:14px; color:#94a3b8;">mostrar</span>  
        </div>

        <span style="text-align: center; color: rgb(204, 74, 74); display: none;" id="submitError">Não foi possível realizar o login, tente novamente</span>
        
        <button class="cta" id="submit" type="submit">Entrar conta</button>

        <div class="login"><a href="form.html">Não tem uma conta? Clique aqui.</a></div>

    </form>
    
    <footer>
    © 2026 Diartrip — Planejamento Inteligente de Viagens
    </footer>

    <script>
        const togglePassword = document.getElementById("togglePassword")
        const emailInput = document.getElementById("email")
        const passwordInput = document.getElementById("password")
        const submit = document.querySelector("#submit")



        togglePassword.addEventListener("click", () => {
            if(passwordInput.type === "password"){
                passwordInput.type = "text"
                togglePassword.textContent = "ocultar"
            }else{
                passwordInput.type = "password"
                togglePassword.textContent = "mostrar"
            } 
        })

        submit.addEventListener("click", async (e)=>{
            e.preventDefault()
            const submitError = document.querySelector("#submitError")
            const resp = await fetch(`http://127.0.0.1:8000/login?email=${emailInput.value}&senha=${passwordInput.value}`, {
                method: "POST",
                headers:{
                "Content-type": "application/json"
                }
            })
                  
            if(resp.ok) window.location.href = "lobby.html"           
            else if(resp.status === 401) submitError.style.display = "block" 
                       
        })
    </script>
        
</body>
</html>
